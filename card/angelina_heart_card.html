<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Открытка для Ангелины ❤</title>
<style>
  :root{
    --pink:#ff6b9d;
    --deep:#c2185b;
    --soft:#fff0f5;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Trebuchet MS", system-ui, sans-serif;
    background:linear-gradient(135deg,#ffe0ec 0%,#ffd6e8 40%,#ffc8dd 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;position:relative;
  }
  /* floating hearts background */
  .bg-heart{position:fixed;bottom:-60px;font-size:28px;opacity:.5;animation:float 9s linear infinite;user-select:none;}
  @keyframes float{
    0%{transform:translateY(0) rotate(0);opacity:0;}
    10%{opacity:.6;}
    90%{opacity:.6;}
    100%{transform:translateY(-115vh) rotate(360deg);opacity:0;}
  }
  .card{
    position:relative;z-index:2;
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(6px);
    border-radius:28px;
    padding:48px 36px 40px;
    max-width:440px;width:90%;
    text-align:center;
    box-shadow:0 20px 60px rgba(194,24,91,.25);
    transform:translateY(20px);opacity:0;
    animation:cardIn .9s ease forwards .2s;
  }
  @keyframes cardIn{to{transform:translateY(0);opacity:1;}}
  .sticker{
    width:140px;height:140px;object-fit:contain;
    margin-bottom:8px;
    animation:beat 1.6s ease-in-out infinite;
    filter:drop-shadow(0 8px 16px rgba(194,24,91,.3));
  }
  @keyframes beat{0%,100%{transform:scale(1);}25%{transform:scale(1.12);}40%{transform:scale(1);}}
  h1{color:var(--deep);font-size:30px;margin:6px 0 4px;}
  .name{color:var(--pink);}
  p.msg{color:#5a3946;font-size:17px;line-height:1.6;margin:14px 0 26px;}
  .hidden-msg{
    max-height:0;overflow:hidden;opacity:0;
    transition:max-height .6s ease, opacity .6s ease, margin .6s ease;
    color:#7a4b5c;font-size:16px;line-height:1.6;margin:0;
  }
  .hidden-msg.show{max-height:300px;opacity:1;margin:0 0 24px;}
  .btn{
    border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--pink),var(--deep));
    color:#fff;font-size:16px;font-weight:bold;
    padding:13px 26px;border-radius:999px;
    box-shadow:0 8px 20px rgba(194,24,91,.35);
    transition:transform .15s ease, box-shadow .15s ease;
    margin:4px;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(194,24,91,.45);}
  .btn:active{transform:translateY(0);}
  .btn.secondary{background:#fff;color:var(--deep);border:2px solid var(--pink);}
  .credit{margin-top:18px;font-size:12px;color:#b98a9b;}
</style>
</head>
<body>
  <div class="card">
    <img class="sticker" src="sticker.webp" alt="Сердечко" onerror="this.replaceWith(Object.assign(document.createElement('div'),{textContent:'❤',style:'font-size:96px;line-height:140px'}))">
    <h1>Для <span class="name">Ангелины</span> ❤</h1>
    <p class="msg">Ты делаешь каждый день немного теплее и ярче.<br>Эта открытка — маленький знак большой симпатии.</p>
    <p class="hidden-msg" id="secret">Спасибо, что ты есть. Пусть улыбка не сходит с твоего лица, а всё хорошее находит тебя само. ✨</p>
    <button class="btn" onclick="reveal()">Нажми меня 💌</button>
    <button class="btn secondary" onclick="boom()">Сюрприз 🎉</button>
    <div class="credit">сделано с любовью</div>
  </div>

  <script>
    // floating background hearts
    const emojis=["❤","💕","💖","💗","🌸","✨"];
    for(let i=0;i<14;i++){
      const h=document.createElement("div");
      h.className="bg-heart";
      h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      h.style.left=Math.random()*100+"vw";
      h.style.animationDelay=(Math.random()*9)+"s";
      h.style.fontSize=(18+Math.random()*26)+"px";
      document.body.appendChild(h);
    }
    function reveal(){document.getElementById("secret").classList.toggle("show");}
    function boom(){
      for(let i=0;i<40;i++){
        const c=document.createElement("div");
        c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
        c.style.cssText="position:fixed;z-index:5;left:50%;top:50%;font-size:"+(16+Math.random()*22)+"px;pointer-events:none;";
        document.body.appendChild(c);
        const ang=Math.random()*Math.PI*2, dist=120+Math.random()*220;
        const x=Math.cos(ang)*dist, y=Math.sin(ang)*dist;
        c.animate([{transform:"translate(-50%,-50%) scale(.4)",opacity:1},{transform:`translate(calc(-50% + ${x}px),calc(-50% + ${y}px)) scale(1.3)`,opacity:0}],{duration:900+Math.random()*500,easing:"cubic-bezier(.2,.7,.3,1)"}).onfinish=()=>c.remove();
      }
    }
  </script>
</body>
</html>
