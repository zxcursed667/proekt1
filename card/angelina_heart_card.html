<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Открытка для Ангелины ❤</title>

<meta property="og:type" content="website">
<meta property="og:title" content="Открытка для Ангелины ❤">
<meta property="og:description" content="Тебе приготовили тёплое послание — нажми и открой ❤">
<meta property="og:image" content="https://zxcursed667.github.io/proekt1/card/preview.png">
<meta property="og:url" content="https://zxcursed667.github.io/proekt1/">
<meta name="twitter:card" content="summary_large_image">

<style>
  :root{--pink:#ff6b9d;--deep:#c2185b;}
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:"Trebuchet MS", system-ui, sans-serif;
    background:linear-gradient(135deg,#ffe0ec 0%,#ffd6e8 40%,#ffc8dd 100%);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;position:relative;
  }
  .bg-heart{position:fixed;bottom:-60px;font-size:28px;opacity:.5;animation:float 9s linear infinite;user-select:none;pointer-events:none;}
  @keyframes float{0%{transform:translateY(0) rotate(0);opacity:0;}10%{opacity:.6;}90%{opacity:.6;}100%{transform:translateY(-115vh) rotate(360deg);opacity:0;}}

  /* ===== ЭКРАН С КОНВЕРТОМ ===== */
  #env-screen{position:relative;z-index:3;text-align:center;transition:opacity .5s ease, transform .5s ease;}
  #env-screen.hide{opacity:0;transform:scale(.85);pointer-events:none;}
  .envelope{position:relative;width:320px;height:210px;margin:0 auto;cursor:pointer;perspective:900px;
    filter:drop-shadow(0 18px 40px rgba(194,24,91,.35));animation:bob 3s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  .envelope .body{position:absolute;inset:0;background:#ec407a;border-radius:10px;z-index:1;}
  .letter{position:absolute;left:7%;top:9%;width:86%;height:82%;background:#fff;border-radius:8px;z-index:2;
    display:flex;align-items:center;justify-content:center;font-size:50px;color:var(--pink);
    box-shadow:0 6px 16px rgba(0,0,0,.15);transition:transform 1s ease .35s;}
  .front{position:absolute;inset:0;z-index:3;background:linear-gradient(135deg,#f06292,#ec407a);
    clip-path:polygon(0 32%,50% 78%,100% 32%,100% 100%,0 100%);border-radius:10px;}
  .flap{position:absolute;left:0;top:0;width:100%;height:58%;background:#f48fb1;z-index:4;
    clip-path:polygon(0 0,100% 0,50% 100%);transform-origin:top center;
    transition:transform .6s ease, z-index .6s;}
  .seal{position:absolute;top:28%;left:50%;transform:translateX(-50%);width:38px;height:38px;
    background:radial-gradient(circle at 35% 30%, #ff7a9c, #c2185b);border-radius:50%;z-index:5;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;
    box-shadow:0 3px 8px rgba(0,0,0,.25);transition:opacity .3s ease;}
  .envelope.open .flap{transform:rotateX(175deg);z-index:1;}
  .envelope.open .letter{transform:translateY(-135%) scale(1.05);z-index:6;}
  .envelope.open .seal{opacity:0;}
  .hint{margin-top:34px;color:var(--deep);font-size:16px;opacity:.85;animation:pulse 1.8s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}

  /* ===== ОТКРЫТКА ===== */
  .card{position:absolute;z-index:2;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);
    border-radius:28px;padding:44px 34px 36px;max-width:440px;width:90%;text-align:center;
    box-shadow:0 20px 60px rgba(194,24,91,.25);opacity:0;transform:translateY(24px) scale(.96);
    pointer-events:none;transition:opacity .6s ease, transform .6s ease;}
  .card.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
  .sticker{width:140px;height:140px;object-fit:contain;margin-bottom:8px;
    animation:beat 1.6s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(194,24,91,.3));}
  @keyframes beat{0%,100%{transform:scale(1);}25%{transform:scale(1.12);}40%{transform:scale(1);}}
  h1{color:var(--deep);font-size:30px;margin:6px 0 4px;}
  .name{color:var(--pink);}
  p.msg{color:#5a3946;font-size:17px;line-height:1.6;margin:14px 0 24px;}
  .hidden-msg{max-height:0;overflow:hidden;opacity:0;transition:max-height .6s ease, opacity .6s ease, margin .6s ease;color:#7a4b5c;font-size:16px;line-height:1.6;margin:0;}
  .hidden-msg.show{max-height:300px;opacity:1;margin:0 0 22px;}
  .btn{border:none;cursor:pointer;background:linear-gradient(135deg,var(--pink),var(--deep));color:#fff;
    font-size:16px;font-weight:bold;padding:13px 26px;border-radius:999px;
    box-shadow:0 8px 20px rgba(194,24,91,.35);transition:transform .15s ease, box-shadow .15s ease;margin:4px;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(194,24,91,.45);}
  .btn:active{transform:translateY(0);}
  .btn.secondary{background:#fff;color:var(--deep);border:2px solid var(--pink);}
  .credit{margin-top:18px;font-size:12px;color:#b98a9b;}
</style>
</head>
<body>

  <div id="env-screen">
    <div class="envelope" id="envelope" onclick="openEnvelope()">
      <div class="body"></div>
      <div class="letter">❤</div>
      <div class="front"></div>
      <div class="flap"></div>
      <div class="seal">❤</div>
    </div>
    <p class="hint">нажми на конверт</p>
  </div>

  <div class="card" id="card">
    <img class="sticker" src="sticker.webp" alt="Стикер" onerror="this.replaceWith(Object.assign(document.createElement('div'),{textContent:'❤',style:'font-size:96px;line-height:140px'}))">
    <h1>Для <span class="name" id="who">Ангелины</span> ❤</h1>
    <p class="msg">Ты делаешь каждый день немного теплее и ярче.<br>Эта открытка — маленький знак большой симпатии.</p>
    <p class="hidden-msg" id="secret">Спасибо, что ты есть. Пусть улыбка не сходит с твоего лица, а всё хорошее находит тебя само. ✨</p>
    <button class="btn" onclick="reveal()">Нажми меня 💌</button>
    <button class="btn secondary" onclick="fireConfetti()">Сюрприз 🎉</button>
    <div class="credit">сделано с любовью</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    // имя из ?name=
    var nm = (new URLSearchParams(location.search).get("name") || "Ангелины").slice(0,40);
    document.getElementById("who").textContent = nm;
    document.title = "Открытка для " + nm + " ❤";

    // летающие сердечки
    var emojis=["❤","💕","💖","💗","🌸","✨"];
    for(var i=0;i<14;i++){
      var h=document.createElement("div");
      h.className="bg-heart";
      h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      h.style.left=Math.random()*100+"vw";
      h.style.animationDelay=(Math.random()*9)+"s";
      h.style.fontSize=(18+Math.random()*26)+"px";
      document.body.appendChild(h);
    }

    var opened=false;
    function openEnvelope(){
      if(opened) return; opened=true;
      document.getElementById("envelope").classList.add("open");
      setTimeout(function(){
        document.getElementById("env-screen").classList.add("hide");
        document.getElementById("card").classList.add("show");
        fireConfetti();
      },1300);
    }
    function reveal(){document.getElementById("secret").classList.toggle("show");}

    function fireConfetti(){
      if(window.confetti){
        var colors=["#ff6b9d","#c2185b","#ff8fb1","#ffd1e0"];
        confetti({particleCount:130,spread:85,origin:{y:.6},colors:colors});
        setTimeout(function(){confetti({particleCount:80,angle:60,spread:70,origin:{x:0},colors:colors});},200);
        setTimeout(function(){confetti({particleCount:80,angle:120,spread:70,origin:{x:1},colors:colors});},200);
      } else { heartBurst(); }
    }
    // резерв, если CDN не загрузился
    function heartBurst(){
      for(var i=0;i<40;i++){
        var c=document.createElement("div");
        c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
        c.style.cssText="position:fixed;z-index:9;left:50%;top:50%;font-size:"+(16+Math.random()*22)+"px;pointer-events:none;";
        document.body.appendChild(c);
        var ang=Math.random()*Math.PI*2, dist=120+Math.random()*220;
        var x=Math.cos(ang)*dist, y=Math.sin(ang)*dist;
        c.animate([{transform:"translate(-50%,-50%) scale(.4)",opacity:1},{transform:"translate(calc(-50% + "+x+"px),calc(-50% + "+y+"px)) scale(1.3)",opacity:0}],{duration:900+Math.random()*500,easing:"cubic-bezier(.2,.7,.3,1)"}).onfinish=function(){this.effect.target.remove();};
      }
    }
  </script>
</body>
</html>
